name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:links
      - run: npm run test:performance
      - run: npm run build
        env:
          VITE_BASE_PATH: /melodialect/
          VITE_BUILD_ID: ci-${{ github.sha }}

  browser:
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, msedge, firefox, webkit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: npm run build
        env:
          VITE_BASE_PATH: /melodialect/
          VITE_BUILD_ID: browser-${{ github.sha }}
      - run: npx playwright test --project=${{ matrix.browser }}
        env:
          VITE_BASE_PATH: /melodialect/
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-${{ matrix.browser }}
          path: test-results/
          retention-days: 7
